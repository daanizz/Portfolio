<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal portfolio — designer, developer, creator." />
    <title>Portfolio</title>

    <!-- Fonts: Playfair Display (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
    <div class="bg-noise"></div>


    <!-- ▸ HERO ────────────────────────────────────────────────────── -->
    <header id="hero" class="hero">
        <div class="hero__inner">
            <div class="hero__label">Portfolio</div>
            <div class="hero__content">
                <img id="hero-avatar" class="hero__avatar" src="" alt="Profile" style="display: none;" />
                <h1 class="hero__name" id="hero-name">—</h1>
                <p class="hero__tagline" id="hero-tagline">&nbsp;</p>
                <div class="hero__socials" id="hero-socials"></div>
            </div>
        </div>
        <div class="hero__scroll-hint">
            <span>Scroll</span>
            <div class="hero__scroll-line"></div>
        </div>
    </header>

    <!-- ▸ ABOUT ───────────────────────────────────────────────────── -->
    <section id="about" class="section section--about">
        <div class="section__grid">
            <div class="section__label reveal">About</div>
            <div class="section__content reveal" id="about-content">
                <p>Loading…</p>
            </div>
        </div>
    </section>

    <!-- ▸ SKILLS ──────────────────────────────────────────────────── -->
    <section id="skills" class="section section--skills">
        <div class="section__grid">
            <div class="section__label reveal">Skills</div>
            <div class="section__content" id="skills-content">
                <!-- Grouped skill tags render here -->
            </div>
        </div>
    </section>

    <!-- ▸ DYNAMIC CATEGORIES ──────────────────────────────────────── -->
    <div id="categories-container">
        <!-- Each category renders as its own <section> -->
    </div>

    <!-- ▸ CONTACT ─────────────────────────────────────────────────── -->
    <section id="contact" class="section section--contact">
        <div class="section__grid section__grid--centered">
            <div class="section__label reveal">Contact</div>
            <div class="section__content reveal">
                <p class="contact__text">Interested in working together?</p>
                <a id="contact-email" class="contact__link" href="mailto:hello@example.com">
                    hello@example.com
                </a>
            </div>
        </div>
    </section>

    <!-- ▸ FOOTER ──────────────────────────────────────────────────── -->
    <footer class="footer">
        <div class="footer__inner">
            <div class="footer__socials" id="footer-socials"></div>
            <p class="footer__copy">&copy; <span id="footer-year">2026</span> <span id="footer-name">—</span></p>
        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
